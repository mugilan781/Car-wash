<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to your GlossForge Detail account to manage bookings and view your service history." />
  <title>Sign In | GlossForge Detail</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .pw-wrap { position:relative; }
    .pw-wrap .form-control { padding-right:3rem; }
    .password-toggle { position:absolute; right:1rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1rem; color:var(--gray-400); }
    .social-auth { display:flex; gap:0.75rem; }
    .social-auth-btn { flex:1; padding:0.75rem; border:1.5px solid var(--black-border); border-radius:var(--r-md); background:var(--black-card); color:var(--white); font-size:0.875rem; font-weight:600; cursor:pointer; transition:var(--t-fast); display:flex; align-items:center; justify-content:center; gap:0.5rem; }
    .social-auth-btn:hover { border-color:var(--blue); background:rgba(37,99,235,0.08); }
    .bg-login { position:absolute; inset:0; background:linear-gradient(135deg,#060914,#0d1626); z-index:0; overflow:hidden; }
    .bg-login::before { content:''; position:absolute; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(37,99,235,0.15),transparent 70%); top:-150px; right:-150px; animation:float 8s ease-in-out infinite; }
    .bg-login::after { content:''; position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(6,182,212,0.1),transparent 70%); bottom:-150px; left:-150px; animation:float 6s ease-in-out 2s infinite; }
  </style>
</head>
<body style="min-height:100vh;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow-x:hidden;box-sizing:border-box;">
  <div class="bg-login"></div>

  <div style="width:100%;max-width:520px;position:relative;z-index:1;">
    <!-- Logo -->
    <a href="index.html" class="navbar__logo" style="justify-content:center;margin-bottom:2rem;display:flex;text-decoration:none;">
      <img src="assets/images/logo.png" alt="GlossForge Logo" class="navbar__logo-img">
      <span class="navbar__logo-text">Gloss<span>Forge</span></span>
    </a>

    <div class="auth-card">
      <div class="auth-title">Sign In</div>
      <p class="auth-subtitle">Enter your credentials to access your account.</p>

      <!-- Social Login -->
      <div class="social-auth">
        <button class="social-auth-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" style="margin-right:0.5rem;vertical-align:middle;">
            <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.68 1.54 14.98 1 12 1 7.35 1 3.37 3.65 1.39 7.56l3.92 3.04c.97-2.9 3.69-5.56 6.69-5.56z"/>
            <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.46c-.29 1.48-1.14 2.73-2.4 3.58l3.76 2.91c2.2-2.03 3.67-5.02 3.67-8.64z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.76-2.91c-1.04.7-2.38 1.11-3.52 1.11-3 0-5.72-2.66-6.69-5.56L1.39 16.02C3.37 19.93 7.35 23 12 23z"/>
            <path fill="#FBBC05" d="M5.3 13.06c-.25-.74-.4-1.54-.4-2.36s.15-1.62.4-2.36L1.39 7.56C.5 9.34 0 11.27 0 13.3c0 2.03.5 3.96 1.39 5.74l3.91-3.04c-.25-.75-.4-1.55-.4-2.38z"/>
          </svg>
          Google
        </button>
        <button class="social-auth-btn"><i class="fab fa-apple" style="color:var(--white);"></i> Apple</button>
      </div>
      <div class="divider-text">or continue with email</div>

      <!-- Login Form -->
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address *</label>
          <input class="form-control" type="email" id="login-email" name="email" placeholder="john@example.com" required autocomplete="email" />
          <span class="form-error">Enter a valid email address.</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password" style="display:flex;justify-content:space-between;">
            <span>Password *</span>
            <a href="#" style="color:var(--cyan);font-weight:600;font-size:0.8rem;">Forgot Password?</a>
          </label>
          <div class="pw-wrap">
            <input class="form-control" type="password" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="password-toggle" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
          </div>
          <span class="form-error">Password is required.</span>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1.5rem;">
          <input type="checkbox" id="remember-me" style="width:16px;height:16px;accent-color:var(--blue);cursor:pointer;" />
          <label for="remember-me" style="font-size:0.875rem;color:var(--gray-400);cursor:pointer;">Keep me signed in</label>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;height:52px;">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create Account</a>
      </div>
      <div style="text-align:center;margin-top:1rem;">
        <a href="index.html" style="color:var(--gray-400);font-size:0.825rem;"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    </div>
  </div>

<script src="js/main.js"></script>
<script src="js/booking.js"></script>
</body>
</html>
